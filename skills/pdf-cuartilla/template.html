<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>{{TITLE}}</title>
<style>
  @page { size: Letter; margin: 1.5cm 1.8cm; }
  * { box-sizing: border-box; }
  body {
    font-family: "Segoe UI", Calibri, Arial, sans-serif;
    font-size: 10.5pt;   /* ejecutivo: 11pt */
    line-height: 1.35;
    color: #1a1a1a;
    margin: 0;
  }
  h1 {
    font-size: 16pt;
    margin: 0 0 4px 0;
    color: #0b3d91;
    border-bottom: 2px solid #0b3d91;
    padding-bottom: 4px;
  }
  h2 {
    font-size: 11.5pt;   /* ejecutivo: 13pt */
    margin: 10px 0 4px 0;
    color: #0b3d91;
  }
  .sub {
    font-size: 9pt;
    color: #555;
    margin-bottom: 8px;
  }
  ul, ol { margin: 4px 0 4px 18px; padding: 0; }
  li { margin-bottom: 2px; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 9.5pt;   /* ejecutivo: 10pt */
    margin: 4px 0;
  }
  th, td {
    border: 1px solid #bbb;
    padding: 4px 6px;
    text-align: left;
    vertical-align: top;
  }
  th { background: #e8eef9; color: #0b3d91; }
  td.num { text-align: center; font-weight: bold; width: 22px; }
  .quote {
    background: #fffceb;
    border-left: 3px solid #d4a017;
    padding: 6px 10px;
    margin: 6px 0;
    font-style: italic;
    font-size: 10pt;
  }
  .warn {
    background: #fdecea;
    border-left: 3px solid #c0392b;
    padding: 6px 10px;
    margin: 6px 0;
    font-size: 10pt;
  }
  .warn strong { color: #c0392b; }
  code {
    background: #f0f0f0;
    padding: 1px 4px;
    border-radius: 3px;
    font-family: Consolas, monospace;
    font-size: 9.5pt;
  }
</style>
</head>
<body>

<h1>{{TITLE}}</h1>
<div class="sub">{{SUBTITLE}}</div>

<!-- Section template: replicate as needed -->
<h2>{{SECTION_NAME}}</h2>
<ul>
  <li>{{BULLET}}</li>
</ul>

<!-- Ranked table template (causes, options, etc.) -->
<table>
  <tr><th style="width:22px">#</th><th style="width:30%">{{COL_A}}</th><th>{{COL_B}}</th></tr>
  <tr><td class="num">1</td><td><b>{{ITEM}}</b></td><td>{{DETAIL}}</td></tr>
</table>

<!-- Citable quote block: phrase the user will read verbatim to the third party -->
<div class="quote">
"{{VERBATIM_PHRASE}}"
</div>

<!-- Red flag / single most important caveat -->
<div class="warn">
<strong>⚠</strong> {{RED_FLAG}}
</div>

</body>
</html>
